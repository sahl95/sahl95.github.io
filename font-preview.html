<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>More Cursive Fonts - Sahl Rowther</title>
  <link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&family=Mr+Dafoe&family=Parisienne&family=Rouge+Script&family=Sacramento&family=Yellowtail&family=Dawning+of+a+New+Day&display=swap" rel="stylesheet" />
  <style>
    body {
      background: #fff8f0;
      padding: 2rem;
      font-family: Arial, sans-serif;
      color: #333;
    }
    .font-sample {
      margin-bottom: 2.5rem;
    }
    .font-name {
      font-size: 1rem;
      font-weight: bold;
      font-family: monospace;
      margin-bottom: 0.3rem;
      color: #666;
    }
    .cursive-text {
      font-size: 3rem;
      line-height: 1.2;
    }
    .yellowtail {
      font-family: 'Yellowtail', cursive;
      color: #b04539;
    }
    .rouge-script {
      font-family: 'Rouge Script', cursive;
      color: #7c3c98;
    }
    .parisienne {
      font-family: 'Parisienne', cursive;
      color: #3b5b5b;
    }
    .homemade-apple {
      font-family: 'Homemade Apple', cursive;
      color: #ca8a04;
    }
    .sacramento {
      font-family: 'Sacramento', cursive;
      color: #155e75;
    }
    .mr-dafoe {
      font-family: 'Mr Dafoe', cursive;
      color: #6b4226;
    }
    .dawning-of-a-new-day {
      font-family: 'Dawning of a New Day', cursive;
      color: #b45309;
    }
  </style>
</head>
<body>

  <div class="font-sample">
    <div class="font-name">Yellowtail</div>
    <div class="cursive-text yellowtail">Sahl Rowther</div>
  </div>

  <div class="font-sample">
    <div class="font-name">Rouge Script</div>
    <div class="cursive-text rouge-script">Sahl Rowther</div>
  </div>

  <div class="font-sample">
    <div class="font-name">Parisienne</div>
    <div class="cursive-text parisienne">Sahl Rowther</div>
  </div>

  <div class="font-sample">
    <div class="font-name">Homemade Apple</div>
    <div class="cursive-text homemade-apple">Sahl Rowther</div>
  </div>

  <div class="font-sample">
    <div class="font-name">Sacramento</div>
    <div class="cursive-text sacramento">Sahl Rowther</div>
  </div>

  <div class="font-sample">
    <div class="font-name">Mr Dafoe</div>
    <div class="cursive-text mr-dafoe">Sahl Rowther</div>
  </div>

  <div class="font-sample">
    <div class="font-name">Dawning of a New Day</div>
    <div class="cursive-text dawning-of-a-new-day">Sahl Rowther</div>
  </div>

</body>
</html>
